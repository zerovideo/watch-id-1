<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes"><title>Redirecting...</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}.card{max-width:480px;width:100%;background:#0a0a0a;border-radius:28px;padding:32px 24px;text-align:center;box-shadow:0 25px 45px rgba(0,0,0,.5);border:1px solid #1f1f1f}h1{color:#fff;font-size:1.8rem;margin-bottom:16px;font-weight:600}p{color:#a0a0a0;font-size:1rem;margin-bottom:28px;line-height:1.5}.countdown-circle{width:80px;height:80px;margin:0 auto 24px;position:relative;display:flex;align-items:center;justify-content:center}svg{width:100%;height:100%;transform:rotate(-90deg)}circle{fill:none;stroke:#2a2a2a;stroke-width:6;cx:40;cy:40;r:35}.progress-ring__circle{stroke:#fff;stroke-dasharray:219.9;stroke-dashoffset:0;transition:stroke-dashoffset .1s linear}.countdown-number{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:1.8rem;font-weight:700;font-family:monospace}.btn{display:inline-block;background:#1f1f1f;color:#fff;text-decoration:none;padding:14px 32px;border-radius:60px;font-weight:600;font-size:1rem;transition:all .2s;border:1px solid #333;cursor:pointer;margin-top:8px}.btn:hover{background:#2a2a2a;transform:scale(1.02)}.btn:active{transform:scale(.98)}.auto-hint{margin-top:20px;font-size:.8rem;color:#6b6b6b}@media (max-width:480px){.card{padding:24px 20px}h1{font-size:1.5rem}.countdown-circle{width:70px;height:70px}.countdown-number{font-size:1.5rem}}</style></head><body><div class="card"><h1>🔄 Redirecting...</h1><p>We're redirecting you to your destination.</p><div class="countdown-circle"><svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="35" stroke="#2a2a2a" stroke-width="6" fill="none"></circle><circle class="progress-ring__circle" cx="40" cy="40" r="35" stroke="#fff" stroke-width="6" fill="none"></circle></svg><div class="countdown-number" id="countdownNumber">5</div></div><a href="https://justvibesid.blogspot.com/" id="continueLink" class="btn">Continue</a><div class="auto-hint">Redirecting in <span id="secondsLeft">5</span> seconds...</div></div><script>const targetUrl="https://justvibesid.blogspot.com/";let countdown=5;const countdownEl=document.getElementById("countdownNumber"),secondsLeftSpan=document.getElementById("secondsLeft"),continueLink=document.getElementById("continueLink");continueLink.href=targetUrl;const circumference=2*Math.PI*35,circle=document.querySelector(".progress-ring__circle");const interval=setInterval(()=>{if(countdown-=1,countdown>=0){countdownEl.innerText=countdown,secondsLeftSpan.innerText=countdown;const e=circumference-(countdown/5)*circumference;circle.style.strokeDashoffset=e}countdown<=0&&(clearInterval(interval),window.location.href=targetUrl)},1e3);</script></body></html>
